<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tree Ring Counter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f2f7;
            color: #222;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Upload screen */
        #upload-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85vh;
            padding: 24px;
        }
        #upload-container h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        #upload-container .subtitle {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 40px;
        }
        #imageUpload { display: none; }
        .upload-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 3 / 4;
            background: url('exemple-bilder/exemple-bild.jpg') center / cover no-repeat;
            border: 3px solid rgba(76, 175, 80, 0.6);
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.05rem;
            color: #4CAF50;
            padding: 32px 24px;
            text-align: center;
            transition: opacity 0.15s;
            line-height: 1.5;
        }
        .upload-btn:active { opacity: 0.85; }
        .upload-btn .icon { font-size: 3.2rem; margin-bottom: 14px; }


        /* Instructions bar */
        #instructions {
            display: none;
            background: #fff;
            padding: 14px 16px;
            text-align: center;
            font-size: 1rem;
            font-weight: 500;
            color: #333;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Canvas area */
        #canvas-host .canvas-container {
            width: 100%;
            overflow: hidden;
            position: relative;
            background: #1a1a1a;
            touch-action: none;
        }
        #canvas-host .canvas-wrapper {
            position: absolute;
            transform-origin: 0 0;
        }

        /* Results */
        #results-section {
            display: none;
            padding: 12px;
            padding-bottom: 0;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 12px;
        }
        .card-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }
        .ring-count {
            font-size: 2.8rem;
            font-weight: 700;
            color: #4CAF50;
            text-align: center;
            padding: 4px 0;
        }
        #slice-container canvas {
            width: 100%;
            display: block;
            border-radius: 6px;
        }
        #plot-container canvas {
            width: 100%;
            display: block;
        }

        /* Sliders */
        .slider-group { margin-bottom: 14px; }
        .slider-group:last-child { margin-bottom: 0; }
        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #333;
            margin-bottom: 8px;
        }
        .slider-val {
            font-weight: 600;
            font-family: 'SF Mono', ui-monospace, monospace;
            color: #4CAF50;
            font-size: 0.95rem;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: #4CAF50;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }

        /* Buttons */
        .reset-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #ff3b30;
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin: 0 12px 12px;
            width: calc(100% - 24px);
        }
        .reset-btn:active { background: #d32f2f; }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px 16px 32px;
            color: #aaa;
            font-size: 0.8rem;
        }
        footer a { color: #4CAF50; text-decoration: none; }
    </style>
</head>
<body>
    <div id="upload-container">
        <h1>Tree Ring Counter</h1>
        <p class="subtitle">Analysera trädringar från ett tvärsnittsfoto</p>
        <input type="file" id="imageUpload" accept="image/*" capture="environment">
        <label for="imageUpload" class="upload-btn">
            <span class="icon">📷</span>
            Tryck för att ta ett foto<br>eller välj en bild
        </label>
    </div>

    <div id="instructions"></div>
    <div id="canvas-host"></div>

    <div id="results-section">
        <div class="card" style="text-align:center">
            <div class="card-label">Antal ringar</div>
            <div class="ring-count" id="ring-count">&mdash;</div>
        </div>
        <div class="card" id="slice-container">
            <div class="card-label">Tvärsnitt längs linjen</div>
        </div>
        <div class="card" id="controls-card">
            <div class="slider-group">
                <div class="slider-header">
                    <span>Utjämning</span>
                    <span class="slider-val" id="window-value">4</span>
                </div>
                <input type="range" id="window-slider" min="2" max="20" value="4" step="1">
            </div>
            <div class="slider-group">
                <div class="slider-header">
                    <span>Prominence</span>
                    <span class="slider-val" id="prominence-value">7</span>
                </div>
                <input type="range" id="prominence-slider" min="1" max="50" value="7" step="1">
            </div>
        </div>
        <div class="card" id="plot-container">
            <div class="card-label">Gråskaleprofil</div>
        </div>
        <button class="reset-btn" id="reset-btn">Återställ</button>
    </div>

    <footer>
        Kontakta mig: <a href="mailto:martin@bevemyr.com">martin@bevemyr.com</a>
    </footer>

    <script src="TreeRings.js"></script>
</body>
</html>
